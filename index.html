<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>B2P Running Order Live Tracker</title>

  <link rel="icon" type="image/png" sizes="32x32"   href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16"   href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180"      href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="B2P Live">

  <style>
    :root {
      --gold: #FFB90D;
      --done-green: #34a853;
      --text-dark: #202124;
      --text-muted: #5f6368;
      --border: #dadce0;
      --blue-time: #4a86e8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
    }

    /* ── LOADING SCREEN ─────────────────────────────────── */
    #loading-screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #000; z-index: 999;
      transition: opacity 0.5s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }

    .load-container { text-align: center; width: 100%; padding: 20px; }

    .logo-area { position: relative; display: inline-block; margin-bottom: 20px; }
    .logo-area::before {
      content: '';
      position: absolute; top: 50%; left: 50%;
      width: 140px; height: 140px; background: #FFB90D; border-radius: 50%;
      transform: translate(-50%, -50%); filter: blur(45px);
      animation: glowPulse 3s infinite ease-in-out; z-index: 0;
    }
    .logo-area img { width: 160px; height: auto; position: relative; z-index: 1; }

    .load-title {
      font-size: 1.4rem; font-weight: 900; letter-spacing: 5px;
      color: #FFB90D; text-transform: uppercase; margin: 10px 0 2px;
    }
    .load-subtitle {
      font-size: 0.7rem; font-weight: 400; letter-spacing: 0.38em;
      color: rgba(241,194,50,0.55); text-transform: uppercase;
      text-indent: 0.38em;
      margin: 0 0 14px;
    }

    #hype-container { margin-top: 30px; height: 120px; }
    #hype-text {
      font-size: 0.8rem; letter-spacing: 2px; color: #FFB90D;
      text-transform: uppercase; margin-bottom: 12px; font-weight: bold; height: 1.2rem;
    }
    #percentage { font-size: 3rem; font-weight: 900; color: white; font-variant-numeric: tabular-nums; margin-bottom: 10px; }
    .progress-bar-bg { width: 220px; height: 3px; background: #1a1a1a; margin: 10px auto; overflow: hidden; border-radius: 10px; }
    #progress-bar-fill { width: 0%; height: 100%; background: #FFB90D; box-shadow: 0 0 15px #FFB90D; transition: width 0.1s linear; }

    @keyframes glowPulse {
      0%   { opacity: 0.15; transform: translate(-50%, -50%) scale(1); }
      50%  { opacity: 0.5;  transform: translate(-50%, -50%) scale(1.4); }
      100% { opacity: 0.15; transform: translate(-50%, -50%) scale(1); }
    }

    /* ── MAIN APP ───────────────────────────────────────── */
    #app { display: none; background: #f8f9fa; min-height: 100vh; color: var(--text-dark); }
    #app.visible { display: block; }

    .app-header {
      background: #000; padding: 10px 14px;
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid rgba(241,194,50,0.3);
    }
    .header-inner {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
    }
    .header-logo {
      height: 36px; width: auto; display: block; flex-shrink: 0;
    }
    .header-text { min-width: 0; }
    .header-title {
      font-size: 0.65rem; font-weight: 900; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--gold); line-height: 1;
      margin-bottom: 3px;
    }
    .header-comp {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.72rem; color: #999; line-height: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex-wrap: nowrap;
    }
    .header-comp-city { font-weight: 700; color: #ccc; }
    .header-comp-date { font-weight: 400; color: #888; }

    .sync-dot {
      width: 6px; height: 6px; background: #d93025;
      border-radius: 50%; animation: blink 1.5s infinite; flex-shrink: 0;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    /* ── STANDARD CARDS ─────────────────────────────────── */
    .running-order { padding: 10px 12px 60px; }
    .spacer-row { height: 14px; }

    .row-card {
      background: #fff; border: 1px solid var(--border);
      border-radius: 10px; margin-bottom: 8px; overflow: hidden;
    }
    .row-card.done { background: #fafafa; border-color: #e0e0e0; opacity: 0.72; }

    .card-main {
      display: flex; align-items: center;
      padding: 12px 14px; gap: 10px;
    }
    .card-time {
      font-size: 1rem; font-weight: 800; color: var(--blue-time);
      min-width: 46px; flex-shrink: 0; line-height: 1.3;
    }
    .row-card.done .card-time { color: #9aa0a6; }

    .card-info { flex: 1; min-width: 0; }
    .card-school { font-size: 0.8rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-team   { font-size: 0.95rem; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row-card.done .card-team   { text-decoration: line-through; color: #9aa0a6; }
    .row-card.done .card-school { color: #bbb; }

    .done-btn {
      display: flex; align-items: center; justify-content: center;
      width: 48px; height: 48px; border-radius: 50%;
      border: 2px solid var(--border); background: #fff;
      cursor: pointer; font-size: 1.3rem; font-weight: bold;
      flex-shrink: 0; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .done-btn.active { background: var(--done-green); border-color: var(--done-green); color: white; }

    .award-section { padding: 0 14px 12px; border-top: 1px solid #f0f0f0; }
    .award-label {
      font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 6px; padding-top: 8px;
    }
    .award-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .award-pill {
      padding: 6px 12px; border-radius: 16px; font-size: 0.82rem; font-weight: 600;
      border: 1.5px solid var(--border); background: #f8f9fa; color: var(--text-dark);
      cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
      touch-action: manipulation; user-select: none;
    }
    .award-pill.selected { background: #f1c232; border-color: #c9940a; color: #3d2900; }
    .award-pill.selected.has-individual {
      background: #f1c232; border-color: #c9940a; color: #3d2900;
      padding-right: 8px;
    }
    .award-pill.selected.has-individual::after {
      content: ' 👤';
      font-size: 0.75rem;
    }
    .award-pill.selected:not(.has-individual) {
      cursor: pointer;
    }
    /* Tooltip on hover for desktop */
    .award-pill.selected::before {
      content: 'Right-click to add individual name';
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%; transform: translateX(-50%);
      background: #333; color: #fff;
      font-size: 0.65rem; font-weight: 400;
      padding: 4px 8px; border-radius: 4px;
      white-space: nowrap; pointer-events: none;
      opacity: 0; transition: opacity 0.2s;
      z-index: 10;
    }
    .award-pill.selected:hover::before { opacity: 1; }
    @media (hover: none) {
      .award-pill.selected::before { display: none; }
    }

    /* ── BOTTOM SHEET ────────────────────────────────────── */
    .bottom-sheet-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 400; opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .bottom-sheet-overlay.show {
      opacity: 1; pointer-events: all;
    }
    .bottom-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-radius: 16px 16px 0 0;
      padding: 0 0 32px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 401;
      max-width: 480px; margin: 0 auto;
    }
    .bottom-sheet.show { transform: translateY(0); }
    .bottom-sheet-handle {
      width: 36px; height: 4px; background: #ddd; border-radius: 2px;
      margin: 12px auto 0;
    }
    .bottom-sheet-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .bottom-sheet-title {
      font-size: 1rem; font-weight: 700; color: #1a1a1a;
    }
    .bottom-sheet-award {
      display: inline-block; margin-top: 6px;
      background: #f1c232; color: #3d2900;
      padding: 4px 12px; border-radius: 12px;
      font-size: 0.8rem; font-weight: 600;
    }
    .bottom-sheet-body { padding: 16px 20px; }
    .bs-label {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: #999; margin-bottom: 8px;
    }
    .bs-name-input {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 0.95rem; color: #333;
      box-sizing: border-box; margin-bottom: 8px;
      outline: none;
    }
    .bs-name-input:focus { border-color: #f1c232; }
    .bs-second-name { display: none; }
    .bs-add-second {
      font-size: 0.78rem; color: #4a86e8; cursor: pointer;
      text-decoration: underline; margin-bottom: 16px;
      display: inline-block;
    }
    .bottom-sheet-footer {
      padding: 0 20px;
      display: flex; gap: 10px;
    }
    .bs-btn {
      flex: 1; padding: 12px; border-radius: 8px;
      font-size: 0.9rem; font-weight: 700; border: none;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .bs-btn-deselect { background: #f5f5f5; color: #d93025; }
    .bs-btn-confirm  { background: #f1c232; color: #3d2900; }

    /* ── SPECIAL ROWS ───────────────────────────────────── */
    .special-row {
      border-radius: 8px; margin-bottom: 8px;
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    }
    .sp-time  { font-size: 0.85rem; font-weight: 700; opacity: 0.85; min-width: 46px; flex-shrink: 0; }
    .sp-label { font-size: 0.95rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; flex: 1; }
    .sp-check {
      display: flex; align-items: center; justify-content: center;
      width: 42px; height: 42px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5); background: transparent;
      cursor: pointer; font-size: 1.1rem; flex-shrink: 0;
      transition: all 0.2s; color: rgba(255,255,255,0.9);
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .sp-check.active { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.95); }

    .row-award    { background: #f1c232; color: #3d2900; }
    .row-break    { background: #4a86e8; color: #fff; }
    .row-danceoff { background: #8e7cc3; color: #fff; }

    .row-award .sp-time  { color: #3d2900; }
    .row-award .sp-label { color: #3d2900; }
    .row-award .sp-check { border-color: rgba(61,41,0,0.35); color: #3d2900; }
    .row-award .sp-check.active { background: rgba(61,41,0,0.12); border-color: #3d2900; }

    .special-row.done { opacity: 0.45; filter: grayscale(60%); }

    /* ── TOAST ──────────────────────────────────────────── */
    .saving-toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 10px 20px; border-radius: 20px;
      font-size: 0.85rem; font-weight: 600; opacity: 0; pointer-events: none;
      transition: opacity 0.3s; z-index: 200; white-space: nowrap;
    }
    .saving-toast.show { opacity: 1; }
    .saving-toast.error { background: #d93025; }

    /* ── AWARDS BUTTON (header) ─────────────────────────── */
    .awards-btn {
      display: flex; align-items: center; gap: 4px;
      background: rgba(241,194,50,0.12);
      color: #f1c232;
      border: 1px solid rgba(241,194,50,0.35);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 0.72rem; font-weight: 700;
      cursor: pointer; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: background 0.2s;
      text-transform: uppercase; letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .awards-btn:active { background: rgba(241,194,50,0.25); }
    .awards-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .awards-btn.generating { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
    .export-dots::after {
      content: '';
      animation: exportDots 1.5s infinite;
      display: inline-block; width: 1.5em; text-align: left;
    }
    @keyframes exportDots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }

    /* ── MODAL FORM ELEMENTS ─────────────────────────────── */
    .modal-section-title {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: #999; margin: 16px 0 8px;
    }
    .modal-section-title:first-child { margin-top: 0; }
    .email-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .email-row input[type=checkbox] {
      width: 16px; height: 16px; flex-shrink: 0; cursor: pointer;
      accent-color: #f1c232;
    }
    .email-row input[type=text] {
      flex: 1; padding: 6px 8px; border: 1px solid #ddd;
      border-radius: 4px; font-size: 0.8rem; color: #333;
      background: #fff;
    }
    .email-row input[type=text]:disabled {
      background: #f5f5f5; color: #aaa;
    }
    .extra-email-input {
      width: 100%; padding: 7px 10px; border: 1px solid #ddd;
      border-radius: 4px; font-size: 0.8rem; color: #333;
      box-sizing: border-box; margin-top: 4px;
    }
    .option-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 6px; font-size: 0.85rem; color: #333;
    }
    .option-row input[type=checkbox] {
      width: 16px; height: 16px; flex-shrink: 0;
      accent-color: #f1c232; cursor: pointer;
    }

    /* ── AWARDS MODAL ───────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 300; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: #fff; border-radius: 12px; overflow: hidden;
      max-width: 380px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .modal-header {
      background: #1a1a1a; padding: 20px 24px;
    }
    .modal-header-title {
      font-size: 1rem; font-weight: 900; color: #f1c232;
      text-transform: uppercase; letter-spacing: 2px;
    }
    .modal-header-sub {
      font-size: 0.75rem; color: #aaa; margin-top: 4px;
    }
    .modal-body { padding: 20px 24px; color: #333; font-size: 0.9rem; line-height: 1.5; }
    .modal-warning {
      background: #fff8e1; border-left: 4px solid #f1c232;
      padding: 12px 16px; border-radius: 4px; margin-bottom: 16px;
      font-size: 0.85rem; color: #5a3e00;
    }
    .modal-footer {
      padding: 16px 24px; border-top: 1px solid #f0f0f0;
      display: flex; gap: 10px; justify-content: flex-end;
    }
    .modal-btn {
      padding: 10px 20px; border-radius: 6px; font-size: 0.85rem;
      font-weight: 700; border: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .modal-btn-cancel { background: #f0f0f0; color: #333; }
    .modal-btn-confirm { background: #f1c232; color: #3d2900; }

  </style>
</head>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwREmPTbjTbICoycCjMksAzKQJx9yU7M2Y9QP1z8E8WULTk9iDu4nTVENSjtBper3stOw/exec';

  // ── STATE ─────────────────────────────────────────────────
  // rowLocked: simple boolean per row — true while a save is in flight
  // Once the save promise resolves (success or failure), lock is released
  // and the next refresh can freely update that row from the sheet
  const appState = {
    compName: '',
    awardOptions: [],
    rows: {},
    renderOrder: []
  };

  const rowLocked   = {};  // true while save in flight
  const awardDebounceTimers = {};

  // ── LOADING SCREEN ───────────────────────────────────────
  const hypeWords = [
    'SYNCING THE SCHEDULE...',
    'LOADING PERFORMANCES...',
    'PRIMING THE PLAYLIST...',
    'ROLLING OUT THE LIST...',
    'STANDBY, STANDBY...',
    "IT'S GO TIME!"
  ];

  let count = 0;
  const pctEl  = document.getElementById('percentage');
  const txtEl  = document.getElementById('hype-text');
  const fillEl = document.getElementById('progress-bar-fill');

  const counter = setInterval(() => {
    count++;
    pctEl.textContent  = count + '%';
    fillEl.style.width = count + '%';
    if (count === 1)  txtEl.textContent = hypeWords[0];
    if (count === 20) txtEl.textContent = hypeWords[1];
    if (count === 40) txtEl.textContent = hypeWords[2];
    if (count === 60) txtEl.textContent = hypeWords[3];
    if (count === 80) txtEl.textContent = hypeWords[4];
    if (count >= 100) {
      clearInterval(counter);
      txtEl.textContent = hypeWords[5];
      setTimeout(() => {
        fetchData(true).then(() => {
          document.getElementById('loading-screen').classList.add('hidden');
          document.getElementById('app').classList.add('visible');
          setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
        });
      }, 400);
    }
  }, 18);

  // ── FETCH & RECONCILE ────────────────────────────────────
  async function fetchData(forceFullRender = false) {
    try {
      const res  = await fetch(SCRIPT_URL);
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      appState.compName     = data.compName || '';
      appState.awardOptions = data.awardOptions || [];
      // Strip emojis and split comp name into city and date for styled header
      // Expected format: "⭐ Coventry - 14 Jun 2026" or "Coventry — 14 Jun 2026"
      const cleanComp = appState.compName.replace(/[^\u0000-\u007E\u00A0-\u024F\s]/g, '').trim();
      const compParts = cleanComp.split(/\s*[-—]\s*/);
      const cityEl = document.getElementById('comp-name-city');
      const dateEl = document.getElementById('comp-name-date');
      if (cityEl) cityEl.textContent = compParts[0] || cleanComp;
      if (dateEl) dateEl.textContent = compParts.length > 1 ? '— ' + compParts.slice(1).join(' — ') : '';

      let structureChanged = forceFullRender ||
        (appState.renderOrder.length !== data.rows.length);

      data.rows.forEach((networkRow, idx) => {
        const rIndex = networkRow.rowIndex;

        if (!structureChanged && appState.renderOrder[idx] !== rIndex) {
          structureChanged = true;
        }

        // Only update state if no save is currently in flight for this row
        if (!rowLocked[rIndex]) {
          appState.rows[rIndex] = networkRow;
        }
      });

      if (structureChanged) {
        appState.renderOrder = data.rows.map(r => r.rowIndex);
        renderFullOrder();
      } else {
        reconcileDOMChanges();
      }
    } catch (err) {
      console.error('Fetch error:', err);
    }
  }

  // ── RENDER ───────────────────────────────────────────────
  function renderFullOrder() {
    const container = document.getElementById('running-order');
    const scrollY = window.scrollY;
    container.innerHTML = '';

    appState.renderOrder.forEach(rIndex => {
      const row = appState.rows[rIndex];
      if (!row) return;
      if (row.rowType === 'spacer') {
        const d = document.createElement('div');
        d.className = 'spacer-row';
        d.dataset.rowIndex = rIndex;
        container.appendChild(d);
      } else if (row.rowType === 'standard') {
        container.appendChild(buildStandardCard(row));
      } else {
        container.appendChild(buildSpecialRow(row));
      }
    });

    window.scrollTo(0, scrollY);
  }

  function reconcileDOMChanges() {
    appState.renderOrder.forEach(rIndex => {
      const row = appState.rows[rIndex];
      if (!row || row.rowType === 'spacer') return;

      // Skip DOM update if save is in flight — UI already reflects local change
      if (rowLocked[rIndex]) return;

      const element = document.querySelector(`[data-row-index="${rIndex}"]`);
      if (!element) return;

      const isDone = row.done;
      element.classList.toggle('done', isDone);

      if (row.rowType === 'standard') {
        const btn = element.querySelector('.done-btn');
        if (btn) {
          btn.classList.toggle('active', isDone);
          btn.innerHTML = isDone ? '&#10003;' : '';
        }
        // Parse selected awards stripping :Name suffix
        const selectedAwardKeys = row.awardText
          ? row.awardText.split(',').map(a => {
              const ci = a.indexOf(':');
              return ci !== -1 ? a.substring(0, ci).trim() : a.trim();
            }).filter(Boolean)
          : [];
        element.querySelectorAll('.award-pill').forEach(pill => {
          const award      = pill.dataset.award;
          const isSelected = selectedAwardKeys.includes(award);
          pill.classList.toggle('selected', isSelected);
          if (isSelected) {
            const indEntry = row.awardText.split(',').map(a => a.trim())
              .find(a => a.startsWith(award + ':'));
            pill.classList.toggle('has-individual', !!indEntry);
          } else {
            pill.classList.remove('has-individual');
          }
        });
      } else {
        const btn = element.querySelector('.sp-check');
        if (btn) {
          btn.classList.toggle('active', isDone);
          btn.innerHTML = isDone ? '&#10003;' : '';
        }
      }
    });
  }

  // ── DOM BUILDERS ─────────────────────────────────────────
  function buildStandardCard(row) {
    const card = document.createElement('div');
    card.className = 'row-card' + (row.done ? ' done' : '');
    card.dataset.rowIndex = row.rowIndex;

    // Split on comma — matches Google Sheets multi-select format
    // Parse selected awards — strip :Name suffix for comparison
    const selectedAwards = row.awardText
      ? row.awardText.split(',').map(a => {
          const colonIdx = a.indexOf(':');
          return colonIdx !== -1 ? a.substring(0, colonIdx).trim() : a.trim();
        }).filter(Boolean)
      : [];

    const awardHtml = appState.awardOptions.length > 0 ? `
      <div class="award-section">
        <div class="award-label">&#127942; Award(s)</div>
        <div class="award-pills">
          ${appState.awardOptions.map(opt => {
            // Detect individual award (asterisk prefix), strip for display
            const isIndividual = opt.startsWith('*');
            const displayName  = isIndividual ? opt.slice(1).trim() : opt;
            const awardKey     = displayName; // key used in awardText storage

            // Check selected state and individual name
            const isSelected = selectedAwards.some(a => a === awardKey || a.startsWith(awardKey + ':'));
            const indEntry   = row.awardText ? row.awardText.split(',').map(a => a.trim())
                                 .find(a => a.startsWith(awardKey + ':')) : null;
            const hasInd     = !!indEntry;

            return `<button class="award-pill${isSelected ? ' selected' : ''}${hasInd ? ' has-individual' : ''}"
                    onclick="toggleAward(${row.rowIndex}, this)"
                    data-award="${esc(displayName)}"
                    data-individual="${isIndividual}"
                    data-rowindex="${row.rowIndex}"
                    style="position:relative">
              ${esc(displayName)}
            </button>`;
          }).join('')}
        </div>
      </div>` : '';

    card.innerHTML = `
      <div class="card-main">
        <div class="card-time">${esc(row.time)}</div>
        <div class="card-info">
          <div class="card-school">${esc(row.school)}</div>
          <div class="card-team">${esc(row.team)}</div>
        </div>
        <button class="done-btn${row.done ? ' active' : ''}"
                onclick="toggleDone(${row.rowIndex}, this)"
                aria-label="Mark done">${row.done ? '&#10003;' : ''}</button>
      </div>
      ${awardHtml}`;

    return card;
  }

  function buildSpecialRow(row) {
    const div = document.createElement('div');
    const knownTypes = { award: 'row-award', break: 'row-break', danceoff: 'row-danceoff' };
    const typeClass = knownTypes[row.rowType] || '';

    div.className = `special-row ${typeClass}${row.done ? ' done' : ''}`;
    if (!typeClass && row.rowColour) {
      div.style.background = row.rowColour;
      div.style.color = '#fff';
    }
    div.dataset.rowIndex = row.rowIndex;

    div.innerHTML = `
      <div class="sp-time">${esc(row.time)}</div>
      <div class="sp-label">${esc(row.school || row.team || '')}</div>
      <button class="sp-check${row.done ? ' active' : ''}"
              onclick="toggleDone(${row.rowIndex}, this)"
              aria-label="Mark done">${row.done ? '&#10003;' : ''}</button>`;

    return div;
  }

  // ── INTERACTIONS ─────────────────────────────────────────
  async function toggleDone(rowIndex, btn) {
    // Clear any pending award save for this row to avoid concurrent writes
    clearTimeout(awardDebounceTimers[rowIndex]);
    delete awardDebounceTimers[rowIndex];
    rowLocked[rowIndex] = true;

    const targetState = !appState.rows[rowIndex].done;
    appState.rows[rowIndex].done = targetState;

    btn.classList.toggle('active', targetState);
    btn.innerHTML = targetState ? '&#10003;' : '';
    const card = btn.closest('.row-card, .special-row');
    if (card) card.classList.toggle('done', targetState);

    await dispatchSave(rowIndex, { done: targetState });
    rowLocked[rowIndex] = false;
  }

  function toggleAward(rowIndex, btn) {
    const award      = btn.dataset.award;
    const isIndiv    = btn.dataset.individual === 'true';
    const isSelected = btn.classList.contains('selected');

    if (isIndiv) {
      // Individual award — always open bottom sheet
      // Lock row while sheet is open so refresh doesn't interfere
      rowLocked[rowIndex] = true;
      openBs(rowIndex, btn);
      return;
    }

    if (isSelected) {
      // ── Deselect team award ────────────────────────────────
      rowLocked[rowIndex] = true;
      btn.classList.remove('selected', 'has-individual');
      const current = appState.rows[rowIndex].awardText || '';
      const updated = current.split(',').map(a => a.trim())
        .filter(a => a && !a.startsWith(award + ':') && a !== award)
        .join(',');
      appState.rows[rowIndex].awardText = updated;
      scheduleAwardSave(rowIndex);
    } else {
      // ── Select as team award ───────────────────────────────
      rowLocked[rowIndex] = true;
      btn.classList.add('selected');
      btn.classList.remove('has-individual');
      const current = appState.rows[rowIndex].awardText || '';
      const others = current.split(',').map(a => a.trim())
        .filter(a => a && !a.startsWith(award + ':') && a !== award);
      others.push(award);
      appState.rows[rowIndex].awardText = others.join(',');
      scheduleAwardSave(rowIndex);
    }
  }

  function scheduleAwardSave(rowIndex) {
    clearTimeout(awardDebounceTimers[rowIndex]);
    awardDebounceTimers[rowIndex] = setTimeout(async () => {
      await dispatchSave(rowIndex, { awardText: appState.rows[rowIndex].awardText });
      rowLocked[rowIndex] = false;
      delete awardDebounceTimers[rowIndex];
    }, 500);
  }

  async function dispatchSave(rowIndex, payload) {
    showToast('Saving...', false);
    try {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ rowIndex, ...payload }),
        headers: { 'Content-Type': 'text/plain' }
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      showToast('Saved \u2713', false);
    } catch (err) {
      console.error('Save failed:', err);
      showToast('Save failed \u2717', true);
      // Release lock on failure so refresh can recover from sheet
      rowLocked[rowIndex] = false;
    }
  }

  // ── TOAST ────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'saving-toast show' + (isError ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }


  // ── AWARDS SUMMARY ───────────────────────────────────────
  function resetModal() {
    // Restore modal to its default options form state
    document.getElementById('modal-sub').textContent = 'Ready to generate';

    // Rebuild modal body with clean form
    document.getElementById('modal-body').innerHTML = `
      <div class="modal-section-title">Send email to</div>
      <div class="email-row">
        <input type="checkbox" id="email1-check" checked>
        <input type="text" id="email1-val" value="admin@born2performevents.co.uk">
      </div>
      <div class="email-row">
        <input type="checkbox" id="email2-check" checked>
        <input type="text" id="email2-val" value="rainfingers2022@gmail.com">
      </div>
      <div class="email-row">
        <input type="checkbox" id="email3-check" checked>
        <input type="text" id="email3-val" value="info@born2performevents.co.uk">
      </div>
      <div class="modal-section-title">Additional recipients</div>
      <input type="text" class="extra-email-input" id="extra-emails"
             placeholder="e.g. school@example.com, other@example.com">
      <div class="modal-section-title">Options</div>
      <div class="option-row">
        <input type="checkbox" id="opt-drive" checked>
        <label for="opt-drive">Save PDF &amp; Sheet to Google Drive</label>
      </div>
      <div class="option-row">
        <input type="checkbox" id="opt-masterlog" checked>
        <label for="opt-masterlog">Update master awards log</label>
      </div>
    `;

    // Restore default footer buttons
    document.getElementById('modal-footer').innerHTML = `
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn modal-btn-confirm" onclick="confirmGenerate()">Generate Now</button>
    `;
  }

  function handleAwardsBtn() {
    // Always fully reset modal to clean state before showing
    resetModal();

    // Check all standard rows are done
    const standardRows = appState.renderOrder
      .map(i => appState.rows[i])
      .filter(r => r && r.rowType === 'standard');

    const undone = standardRows.filter(r => !r.done);

    if (undone.length > 0) {
      document.getElementById('modal-sub').textContent = 'Not ready';
      document.getElementById('modal-body').innerHTML = `
        <div class="modal-warning">
          ⚠️ <strong>${undone.length} routine${undone.length > 1 ? 's have' : ' has'} not been marked as done.</strong><br>
          All routines must be ticked before generating the awards summary.
        </div>
        Please go back and mark all routines as complete, then try again.
      `;
      document.getElementById('modal-footer').innerHTML = `
        <button class="modal-btn modal-btn-confirm" onclick="closeModal()">OK, got it</button>
      `;
      document.getElementById('awards-modal').classList.remove('hidden');
      return;
    }

    // All done — show the options form
    document.getElementById('modal-sub').textContent = 'All routines complete';
    document.getElementById('awards-modal').classList.remove('hidden');
    document.getElementById('awards-modal').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('awards-modal').classList.add('hidden');
  }

  async function confirmGenerate() {
    // Collect email recipients from form
    const emails = [];
    [['email1-check','email1-val'],['email2-check','email2-val'],['email3-check','email3-val']].forEach(([chk,val]) => {
      const cb = document.getElementById(chk);
      const inp = document.getElementById(val);
      if (cb && cb.checked && inp && inp.value.trim()) emails.push(inp.value.trim());
    });
    const extra = document.getElementById('extra-emails').value.trim();
    if (extra) extra.split(',').forEach(e => { const t = e.trim(); if (t) emails.push(t); });

    const saveToDrive   = document.getElementById('opt-drive').checked;
    const updateMaster  = document.getElementById('opt-masterlog').checked;

    closeModal();
    const btn = document.getElementById('awards-btn');
    btn.classList.add('generating');
    btn.innerHTML = '⏳ Exporting<span class="export-dots"></span>';
    btn.disabled = true;

    try {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'generateAwards', emails, saveToDrive, updateMaster }),
        headers: { 'Content-Type': 'text/plain' }
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      // Success modal
      document.getElementById('modal-sub').textContent = 'Done!';
      document.getElementById('modal-body').innerHTML = `
        <div style="text-align:center;padding:10px 0;">
          <div style="font-size:2.5rem;margin-bottom:12px;">🏆</div>
          <div style="font-weight:700;font-size:1rem;margin-bottom:8px;">Awards summary generated!</div>
          <div style="font-size:0.85rem;color:#666;margin-bottom:16px;">${data.awardCount} award${data.awardCount !== 1 ? 's' : ''} recorded for ${data.compName}</div>
          <a href="${data.folderUrl}" target="_blank"
             style="display:inline-block;background:#f1c232;color:#3d2900;padding:10px 24px;border-radius:4px;font-weight:700;font-size:0.85rem;text-decoration:none;">
            View Drive Folder →
          </a>
        </div>
      `;
      document.getElementById('modal-footer').innerHTML = `
        <button class="modal-btn modal-btn-confirm" onclick="closeModal()">Close</button>
      `;
      document.getElementById('awards-modal').classList.remove('hidden');

      showToast('Awards summary sent ✓', false);

    } catch (err) {
      console.error('Awards generation failed:', err);
      showToast('Generation failed ✗', true);
      document.getElementById('modal-sub').textContent = 'Error';
      document.getElementById('modal-body').innerHTML = `
        <div class="modal-warning">⚠️ Something went wrong: ${err.message}</div>
        Please try again or contact support.
      `;
      document.getElementById('modal-footer').innerHTML = `
        <button class="modal-btn modal-btn-confirm" onclick="closeModal()">Close</button>
      `;
      document.getElementById('awards-modal').classList.remove('hidden');
    } finally {
      btn.classList.remove('generating');
      btn.innerHTML = '🏆 Export';
      btn.disabled = false;
    }
  }

  // Re-enable button whenever modal is closed
  const _origCloseModal = closeModal;
  closeModal = function() {
    _origCloseModal();
    const btn = document.getElementById('awards-btn');
    if (btn) { btn.disabled = false; btn.classList.remove('generating'); btn.innerHTML = '🏆 Export'; }
  };

  // Close modal on overlay tap
  document.getElementById('awards-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── BOTTOM SHEET (individual name) ─────────────────────
  let bsRowIndex = null;
  let bsBtn      = null;
  let bsAward    = null;

  function openBs(rowIndex, btn) {
    bsRowIndex = rowIndex;
    bsBtn      = btn;
    bsAward    = btn.dataset.award;
    // Row stays locked until confirmed/deselected/cancelled

    // Pre-fill if individual name already set
    const awardText = appState.rows[rowIndex] ? appState.rows[rowIndex].awardText || '' : '';
    const parts = awardText.split(',').map(a => a.trim());
    const existing = parts.find(p => p.startsWith(bsAward + ':'));
    const names = existing ? existing.slice(bsAward.length + 1).split(';') : [];

    document.getElementById('bs-award-label').textContent = bsAward;
    document.getElementById('bs-name1').value = names[0] || '';
    document.getElementById('bs-name2').value = names[1] || '';
    document.getElementById('bs-second-wrap').style.display = names[1] ? 'block' : 'none';
    document.getElementById('bs-add-second').style.display = names[1] ? 'none' : 'inline-block';

    document.getElementById('bs-overlay').classList.add('show');
    document.getElementById('bottom-sheet').classList.add('show');
    setTimeout(() => document.getElementById('bs-name1').focus(), 350);
  }

  function closeBs(cancelled) {
    document.getElementById('bs-overlay').classList.remove('show');
    document.getElementById('bottom-sheet').classList.remove('show');
    // If cancelled (overlay tap or explicit cancel), unlock row without saving
    if (cancelled && bsRowIndex !== null) {
      rowLocked[bsRowIndex] = false;
    }
  }

  function showSecondName() {
    document.getElementById('bs-second-wrap').style.display = 'block';
    document.getElementById('bs-add-second').style.display = 'none';
    document.getElementById('bs-name2').focus();
  }

  function bsConfirm() {
    const name1 = document.getElementById('bs-name1').value.trim();
    const name2 = document.getElementById('bs-name2').value.trim();
    if (bsBtn === null || bsRowIndex === null) { closeBs(true); return; }

    closeBs(false); // don't unlock yet — scheduleAwardSave handles unlock

    // Make sure pill is selected
    bsBtn.classList.add('selected');

    const current = appState.rows[bsRowIndex].awardText || '';
    const others  = current.split(',').map(a => a.trim())
      .filter(a => a && !a.startsWith(bsAward + ':') && a !== bsAward);

    if (name1) {
      const nameStr = name2 ? name1 + ';' + name2 : name1;
      bsBtn.classList.add('has-individual');
      others.push(bsAward + ':' + nameStr);
    } else {
      // No name — treat as team award fallback
      bsBtn.classList.remove('has-individual');
      others.push(bsAward);
    }

    appState.rows[bsRowIndex].awardText = others.join(',');
    // rowLocked already true from toggleAward — scheduleAwardSave will unlock after save
    scheduleAwardSave(bsRowIndex);
  }

  // Individual awards open bottom sheet via toggleAward (asterisk detection)
  // No long press or right-click needed

  // ── LIVE REFRESH ─────────────────────────────────────────
  setInterval(() => fetchData(false), 10000);
</script>

<!-- INDIVIDUAL NAME BOTTOM SHEET -->
<div class="bottom-sheet-overlay" id="bs-overlay" onclick="closeBs(true)"></div>
<div class="bottom-sheet" id="bottom-sheet">
  <div class="bottom-sheet-handle"></div>
  <div class="bottom-sheet-header">
    <div class="bottom-sheet-title">Individual Award</div>
    <span class="bottom-sheet-award" id="bs-award-label"></span>
  </div>
  <div class="bottom-sheet-body">
    <div class="bs-label">Recipient name</div>
    <input type="text" class="bs-name-input" id="bs-name1" placeholder="Enter name...">
    <div class="bs-second-name" id="bs-second-wrap">
      <input type="text" class="bs-name-input" id="bs-name2" placeholder="Second recipient (rare)...">
    </div>
    <span class="bs-add-second" id="bs-add-second" onclick="showSecondName()">+ Add second recipient</span>
  </div>
  <div class="bottom-sheet-footer">
    <button class="bs-btn bs-btn-deselect" onclick="bsDeselect()">Deselect Award</button>
    <button class="bs-btn bs-btn-confirm" onclick="bsConfirm()">Confirm</button>
  </div>
</div>

<!-- AWARDS MODAL -->
<div class="modal-overlay hidden" id="awards-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-header-title">Awards Summary</div>
      <div class="modal-header-sub" id="modal-sub">Ready to generate</div>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="modal-section-title">Send email to</div>
      <div class="email-row">
        <input type="checkbox" id="email1-check" checked>
        <input type="text" id="email1-val" value="admin@born2performevents.co.uk">
      </div>
      <div class="email-row">
        <input type="checkbox" id="email2-check" checked>
        <input type="text" id="email2-val" value="rainfingers2022@gmail.com">
      </div>
      <div class="email-row">
        <input type="checkbox" id="email3-check" checked>
        <input type="text" id="email3-val" value="info@born2performevents.co.uk">
      </div>
      <div class="modal-section-title">Additional recipients</div>
      <input type="text" class="extra-email-input" id="extra-emails"
             placeholder="e.g. school@example.com, other@example.com">
      <div class="modal-section-title">Options</div>
      <div class="option-row">
        <input type="checkbox" id="opt-drive" checked>
        <label for="opt-drive">Save PDF &amp; Sheet to Google Drive</label>
      </div>
      <div class="option-row">
        <input type="checkbox" id="opt-masterlog" checked>
        <label for="opt-masterlog">Update master awards log</label>
      </div>
    </div>
    <div class="modal-footer" id="modal-footer">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn modal-btn-confirm" onclick="confirmGenerate()">Generate Now</button>
    </div>
  </div>
</div>

</body>
